name: Update Project Metadata

on:
  workflow_dispatch:   # Lisab Run workflow nupu
  issues:
    types: [opened, edited, reopened, closed]
  pull_request:
    types: [opened, edited, reopened, closed]

permissions:
  contents: read
  issues: write
  pull-requests: write
  repository-projects: write

jobs:
  update-project-fields:
    runs-on: ubuntu-latest

    env:
      # ⚠️ Kasuta siin oma PAT tokenit, mitte vaikimisi GITHUB_TOKEN
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Update project fields
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            // 🔹 Sisesta oma PROJECT_ID ja FIELD_ID-d
            const projectId = "PVT_kwHOBnWLgs4BSWam";
            const fieldCreatedBy = "PVTF_lAHOBnWLgs4BSWamzg_6U3A";
            const fieldCreatedDate = "PVTF_lAHOBnWLgs4BSWamzg_6VC4";
            const fieldLastModifiedBy = "PVTF_lAHOBnWLgs4BSWamzg_6VGA";

            // Node_id issue või PR-st
            const isIssue = !!context.payload.issue;
            const item = isIssue ? context.payload.issue : context.payload.pull_request;

            // 🔹 Kui käsitsi run, siis ei ole payload.issue
            if (!item) {
              console.log("Manual run – ei ole issue või PR contexti");
              return;
            }

            const contentNodeId = item.node_id;
            const createdBy = item.user.login;
            const createdAt = item.created_at;
            const lastModifiedBy = context.payload.sender.login;
            const updatedAt = new Date().toISOString();

            console.log("DEBUG: contentNodeId =", contentNodeId);
            console.log("DEBUG: createdBy =", createdBy);
            console.log("DEBUG: createdAt =", createdAt);
            console.log("DEBUG: lastModifiedBy =", lastModifiedBy);
            console.log("DEBUG: updatedAt =", updatedAt);

            // 🔹 Küsime projekti items
            const itemsQuery = await github.graphql(`
              query {
                node(id: "${projectId}") {
                  ... on ProjectV2 {
                    items(first: 100) {
                      nodes {
                        id
                        content {
                          ... on Issue { id }
                          ... on PullRequest { id }
                        }
                      }
                    }
                  }
                }
              }
            `);

            const items = itemsQuery.node.items.nodes;
            console.log("DEBUG: kõik items projektis =", items.map(i => i.content?.id));

            // 🔹 Otsime õige project item
            const projectItem = items.find(i => i.content?.id === contentNodeId);
            console.log("DEBUG: leitud projectItem =", projectItem);

            if (!projectItem) {
              console.log("Item ei ole projektis – workflow ei täida välju");
              return;
            }

            const itemId = projectItem.id;
            console.log("DEBUG: projectItem ID =", itemId);

            // 🔹 Last modified by (uuendatakse iga kord)
            await github.graphql(`
              mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: "${projectId}",
                  itemId: "${itemId}",
                  fieldId: "${fieldLastModifiedBy}",
                  value: { text: "${lastModifiedBy}" }
                }) {
                  projectV2Item { id }
                }
              }
            `);

            // 🔹 Created by ja Created date – ainult loomisel (opened)
            if (context.payload.action === "opened") {
              // Created by
              await github.graphql(`
                mutation {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: "${projectId}",
                    itemId: "${itemId}",
                    fieldId: "${fieldCreatedBy}",
                    value: { text: "${createdBy}" }
                  }) {
                    projectV2Item { id }
                  }
                }
              `);

              // Created date
              await github.graphql(`
                mutation {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: "${projectId}",
                    itemId: "${itemId}",
                    fieldId: "${fieldCreatedDate}",
                    value: { date: "${createdAt}" }
                  }) {
                    projectV2Item { id }
                  }
                }
              `);
            }

            console.log("DEBUG: workflow lõpetatud edukalt");
