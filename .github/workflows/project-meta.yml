name: Update Project Metadata

on:
  workflow_dispatch:   # 👉 lisab "Run workflow" nupu
  issues:
    types: [opened, edited, reopened, closed]
  pull_request:
    types: [opened, edited, reopened, closed]

permissions:
  contents: read
  issues: write
  pull-requests: write
  repository-projects: write

jobs:
  update-project-fields:
    runs-on: ubuntu-latest

    steps:
      - name: Update project fields
        uses: actions/github-script@v7
        with:
          script: |
            const projectId = "PVT_kwHOBnWLgs4BSWam";

            const fieldCreatedBy = "PVTF_lAHOBnWLgs4BSWamzg_6U3A";
            const fieldCreatedDate = "PVTF_lAHOBnWLgs4BSWamzg_6VC4";
            const fieldLastModifiedBy = "PVTF_lAHOBnWLgs4BSWamzg_6VGA";

            const isIssue = !!context.payload.issue;
            const item = isIssue ? context.payload.issue : context.payload.pull_request;

            // Kui käivitad käsitsi (workflow_dispatch), siis pole payload.issue olemas
            if (!item) {
              console.log("Manual run – no issue context");
              return;
            }

            const contentNodeId = item.node_id;
            const createdBy = item.user.login;
            const createdAt = item.created_at;
            const lastModifiedBy = context.payload.sender.login;

            // 🔍 Leia project item ID
            const itemsQuery = await github.graphql(`
              query {
                node(id: "${projectId}") {
                  ... on ProjectV2 {
                    items(first: 100) {
                      nodes {
                        id
                        content {
                          ... on Issue { id }
                          ... on PullRequest { id }
                        }
                      }
                    }
                  }
                }
              }
            `);

            const items = itemsQuery.node.items.nodes;
            const projectItem = items.find(i => i.content?.id === contentNodeId);

            if (!projectItem) {
              console.log("Item not in project");
              return;
            }

            const itemId = projectItem.id;

            // 🔹 Last modified by
            await github.graphql(`
              mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: "${projectId}",
                  itemId: "${itemId}",
                  fieldId: "${fieldLastModifiedBy}",
                  value: { text: "${lastModifiedBy}" }
                }) {
                  projectV2Item { id }
                }
              }
            `);

            // 🔹 ainult loomisel
            if (context.payload.action === "opened") {

              // Created by
              await github.graphql(`
                mutation {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: "${projectId}",
                    itemId: "${itemId}",
                    fieldId: "${fieldCreatedBy}",
                    value: { text: "${createdBy}" }
                  }) {
                    projectV2Item { id }
                  }
                }
              `);

              // Created date
              await github.graphql(`
                mutation {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: "${projectId}",
                    itemId: "${itemId}",
                    fieldId: "${fieldCreatedDate}",
                    value: { date: "${createdAt}" }
                  }) {
                    projectV2Item { id }
                  }
                }
              `);
            }
